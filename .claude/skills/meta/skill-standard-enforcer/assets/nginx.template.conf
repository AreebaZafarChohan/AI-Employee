# IMPACT NOTES:
# - Adjust worker_processes based on CPU cores
# - Configure rate limiting to prevent abuse
# - Set appropriate client_max_body_size for uploads
# - Enable gzip compression for better performance
# - Configure SSL/TLS properly in production

# Number of worker processes (auto = number of CPU cores)
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    # Maximum connections per worker
    worker_connections 1024;
    # Enable accept mutex for load balancing
    accept_mutex on;
}

http {
    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Log format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=2r/s;

    # Upstream backend (application service)
    upstream backend {
        # Use service name from docker-compose.yml
        server {{SERVICE_NAME}}:{{CONTAINER_PORT}};
        # Add multiple servers for load balancing
        # server backend2:{{CONTAINER_PORT}};
        # server backend3:{{CONTAINER_PORT}};
    }

    # Default server
    server {
        listen {{NGINX_PORT_HTTP}};
        server_name {{NGINX_SERVER_NAME}};

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

        # Handle client max body size
        client_max_body_size 10M;

        # Health check endpoint (for Kubernetes/load balancer)
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Rate limited endpoints
        location /api/login {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://backend;
            include proxy_params;
        }

        # Main API location
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            include proxy_params;
        }

        # WebSocket support (if needed)
        location /ws {
            proxy_pass http://backend;
            include proxy_params;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Static files
        location /static/ {
            alias /var/www/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Frontend location (if serving SPA)
        location / {
            proxy_pass http://backend;
            include proxy_params;
        }

        # Block access to sensitive files
        location ~ /\. {
            deny all;
        }
        location ~ \.(env|git|svn)$ {
            deny all;
        }
    }

    # HTTPS server (uncomment for production)
    # server {
    #     listen {{NGINX_PORT_HTTPS}} ssl http2;
    #     server_name {{NGINX_SERVER_NAME}};
    #
    #     # SSL certificates
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #
    #     # SSL configuration
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512;
    #     ssl_prefer_server_ciphers off;
    #
    #     # HSTS
    #     add_header Strict-Transport-Security "max-age=63072000" always;
    #
    #     # Include all location blocks from HTTP server
    #     # (Copy location configs here)
    # }
}

# Proxy parameters
# Save as /etc/nginx/proxy_params
proxy_set_header Host $http_host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_redirect off;
