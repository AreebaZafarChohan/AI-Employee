# Priority Scoring Templates

## Overview
This document contains templates for various priority scoring mechanisms used in the Task Priority Optimizer. These templates serve as starting points for configuring priority calculations based on different organizational needs and contexts.

## Template 1: Basic Weighted Priority Scoring

### Description
A simple weighted average approach that combines multiple priority factors with configurable weights.

### Configuration Template
```yaml
priority_scoring:
  algorithm: weighted_average
  weights:
    urgency: 0.35
    importance: 0.25
    dependency: 0.20
    complexity: 0.10
    workload: 0.10
  factors:
    urgency:
      type: deadline_based
      curve_steepness: 5.0
      midpoint_hours: 24.0
      max_score: 1.0
    importance:
      type: categorical_mapping
      categories:
        critical: 1.0
        high: 0.7
        medium: 0.4
        low: 0.1
    dependency:
      type: critical_path_analysis
      blocking_weight: 0.5
      critical_path_bonus: 0.3
      depth_factor: 0.2
    complexity:
      type: inverse_effort
      max_effort_hours: 40.0
      score_reduction_rate: 0.02
    workload:
      type: resource_availability
      max_utilization: 0.8
      availability_bonus: 0.2
```

### Usage Notes
- Total weights should sum to 1.0
- Adjust urgency curve parameters based on typical deadline patterns
- Modify importance categories to match your organization's classification system
- Complexity factor inversely correlates with priority (more complex tasks get lower priority)

## Template 2: Adaptive Priority Scoring

### Description
An adaptive system that adjusts weights based on historical effectiveness and current context.

### Configuration Template
```yaml
priority_scoring:
  algorithm: adaptive_weights
  base_weights:
    urgency: 0.35
    importance: 0.25
    dependency: 0.20
    complexity: 0.10
    workload: 0.10
  adaptation:
    enabled: true
    learning_rate: 0.05
    effectiveness_window_days: 30
    min_weight: 0.05
    max_weight: 0.7
  context_sensitivity:
    deadline_season: 
      enabled: true
      urgency_multiplier_range: [1.0, 1.5]
      season_duration_days: 14
    project_phase:
      enabled: true
      weights_by_phase:
        planning: { importance: 0.4, dependency: 0.3, urgency: 0.2, complexity: 0.05, workload: 0.05 }
        execution: { urgency: 0.35, dependency: 0.25, importance: 0.2, complexity: 0.1, workload: 0.1 }
        review: { importance: 0.3, urgency: 0.25, dependency: 0.2, workload: 0.15, complexity: 0.1 }
    team_availability:
      enabled: true
      workload_sensitivity: 0.8
  factors:
    urgency:
      type: deadline_based
      curve_steepness: 5.0
      midpoint_hours: 24.0
      max_score: 1.0
    importance:
      type: categorical_mapping
      categories:
        critical: 1.0
        high: 0.7
        medium: 0.4
        low: 0.1
    dependency:
      type: critical_path_analysis
      blocking_weight: 0.5
      critical_path_bonus: 0.3
      depth_factor: 0.2
    complexity:
      type: effort_based
      logarithmic_scaling: true
      base_hours: 8.0
      max_hours: 160.0
    workload:
      type: rolling_average
      window_days: 7
      normalization_method: percentile
```

### Usage Notes
- Enable adaptation cautiously after initial system stabilization
- Set appropriate learning rates (too high = instability, too low = slow adaptation)
- Context sensitivity allows different behaviors for different situations
- Monitor adaptation effectiveness regularly

## Template 3: Deadline-Centric Priority Scoring

### Description
Prioritizes tasks primarily based on deadline proximity, with secondary factors for importance and dependencies.

### Configuration Template
```yaml
priority_scoring:
  algorithm: deadline_centric
  deadline_weight: 0.6
  secondary_factors_weight: 0.4
  deadline_curves:
    standard:
      curve_steepness: 4.0
      midpoint_hours: 48.0
    critical:
      curve_steepness: 8.0
      midpoint_hours: 24.0
    stretch:
      curve_steepness: 2.0
      midpoint_hours: 168.0
  secondary_factors:
    weights:
      importance: 0.4
      dependency: 0.3
      workload: 0.2
      complexity: 0.1
    importance:
      type: business_impact_score
      score_range: [1, 5]
      weight_mapping: [0.1, 0.3, 0.5, 0.7, 1.0]
    dependency:
      type: blocker_analysis
      direct_blocker_bonus: 0.2
      indirect_blocker_bonus: 0.1
      max_indirect_levels: 3
    workload:
      type: capacity_utilization
      under_allocated_bonus: 0.1
      over_allocated_penalty: -0.15
    complexity:
      type: risk_adjustment
      higher_complexity_penalty: -0.1
  grace_periods:
    enabled: true
    by_priority_level:
      critical: 0h
      high: 4h
      medium: 24h
      low: 72h
```

### Usage Notes
- Use for organizations where deadline adherence is paramount
- Adjust grace periods based on task types and organizational flexibility
- Consider different deadline curves for different task categories
- Secondary factors prevent complete neglect of important non-urgent tasks

## Template 4: Strategic Priority Scoring

### Description
Focuses on strategic importance and long-term value rather than immediate urgency, suitable for planning and strategic initiatives.

### Configuration Template
```yaml
priority_scoring:
  algorithm: strategic_focus
  strategic_weight: 0.5
  operational_weight: 0.3
  dependency_weight: 0.2
  strategic_factors:
    business_value:
      type: roi_based
      revenue_impact_weight: 0.4
      cost_reduction_weight: 0.3
      risk_mitigation_weight: 0.2
      innovation_value_weight: 0.1
    alignment:
      type: objective_matching
      company_goals_weight: 0.5
      department_goals_weight: 0.3
      team_goals_weight: 0.2
    reach_impact:
      type: affected_stakeholders
      internal_users_weight: 0.4
      external_customers_weight: 0.4
      business_processes_weight: 0.2
  operational_factors:
    urgency:
      type: soft_deadlines
      softness_factor: 0.7  # Less penalty for missing deadlines
      early_completion_bonus: 0.1
    dependencies:
      type: strategic_dependencies
      upstream_strategic_bonus: 0.2
      downstream_impact_multiplier: 0.3
    resource_availability:
      type: long_term_planning
      availability_horizon_weeks: 12
      resource_conflict_penalty: -0.1
  risk_adjustment:
    implementation_risk:
      type: probability_impact_matrix
      probability_threshold: 0.3
      impact_scale: [-0.2, 0.1]
    technical_risk:
      type: complexity_uncertainty
      high_complexity_penalty: -0.15
      unknown_technology_penalty: -0.25
  time_horizon:
    planning_window_months: 12
    review_frequency: quarterly
```

### Usage Notes
- Ideal for long-term planning and strategic initiatives
- Reduces emphasis on short-term urgency in favor of strategic value
- Includes risk assessments to prevent overly risky high-value projects
- Designed for quarterly or annual planning cycles

## Template 5: Balanced Priority Scoring

### Description
A balanced approach that equally considers urgency, importance, and strategic value while maintaining operational efficiency.

### Configuration Template
```yaml
priority_scoring:
  algorithm: balanced_framework
  pillars:
    urgent: 0.25
    important: 0.25
    strategic: 0.25
    operational: 0.25
  urgent_pillar:
    factors:
      deadline_proximity:
        type: exponential_urgency
        decay_constant: 0.05
        max_urgency_days: 7
      stakeholder_pressure:
        type: escalation_based
        escalation_levels: 
          - { level: 1, multiplier: 1.0, condition: "normal" }
          - { level: 2, multiplier: 1.2, condition: "escalated" }
          - { level: 3, multiplier: 1.5, condition: "critical_escalation" }
    time_sensitivity:
      type: business_hours_adjusted
      business_hours_multiplier: 1.2
      weekend_multiplier: 0.8
  important_pillar:
    factors:
      business_impact:
        type: multifaceted_impact
        financial: 0.3
        customer: 0.3
        operational: 0.25
        compliance: 0.15
      stakeholder_value:
        type: hierarchical_weighting
        c_suite: 1.0
        director: 0.8
        manager: 0.6
        individual_contributor: 0.4
  strategic_pillar:
    factors:
      organizational_goals:
        type: alignment_scoring
        short_term: 0.4
        mid_term: 0.4
        long_term: 0.2
      competitive_advantage:
        type: market_differentiation
        high_differentiation: 0.3
        medium_differentiation: 0.15
        low_differentiation: 0.05
  operational_pillar:
    factors:
      dependencies:
        type: network_analysis
        predecessor_count: 0.4
        successor_count: 0.3
        critical_path_membership: 0.3
      resources:
        type: availability_optimization
        team_workload_balance: 0.5
        skill_matching: 0.3
        resource_conflicts: -0.2
      efficiency:
        type: clustering_opportunities
        context_similarity_bonus: 0.1
        location_convenience: 0.05
  adjustment_factors:
    team_capacity:
      current_utilization: 0.85
      available_flexibility: 0.15
    risk_tolerance:
      risk_adjustment_factor: 0.1
    collaboration_needs:
      coordination_complexity: -0.1
      stakeholder_availability: 0.05
```

### Usage Notes
- Suitable for mature organizations with diverse task types
- Provides equal consideration to multiple priority dimensions
- Includes adjustments for capacity and risk tolerance
- Maintains operational efficiency while considering strategic needs

## Template 6: Crisis Mode Priority Scoring

### Description
Designed for crisis or emergency situations where rapid response and impact mitigation are critical.

### Configuration Template
```yaml
priority_scoring:
  algorithm: crisis_response
  response_urgency: 0.7
  impact_minimization: 0.3
  response_urgency_factors:
    detection_to_now:
      type: exponential_acceleration
      acceleration_factor: 0.1
      max_acceleration: 2.0
    escalation_level:
      type: hierarchy_escalation
      level_1: 0.3  # Team lead notified
      level_2: 0.6  # Department head notified
      level_3: 0.8  # Executive notified
      level_4: 1.0  # Crisis team activated
    potential_impact_velocity:
      type: spread_modeling
      linear_spread: 0.4
      exponential_spread: 0.6
      containment_probability: -0.2
  impact_minimization_factors:
    customer_affect:
      type: customer_impact_model
      active_customers: 0.5
      revenue_impact: 0.3
      reputation_risk: 0.2
    business_disruption:
      type: operations_modeling
      revenue_loss_rate: 0.4
      operational_halt_risk: 0.3
      regulatory_compliance_risk: 0.3
    technical_debt_accrual:
      type: compound_impact
      immediate_impact: 0.6
      long_term_compounding: 0.4
  crisis_specific_adjustments:
    resource_diversion:
      available_resource_bonus: 0.3
      skill_relevance_bonus: 0.2
    collaboration_priority:
      cross_team_coordination: 0.2
      external_vendor_coordination: 0.1
    communication_overhead:
      stakeholder_update_necessity: -0.1
      documentation_requirements: -0.05
  stabilization_factors:
    quick_win_bonus: 0.25  # Bonus for tasks that can stabilize situation quickly
    cascade_prevention: 0.3  # Extra priority for preventing further issues
    resource_preservation: 0.15  # Protecting critical resources
  deactivation_criteria:
    stability_period_hours: 24
    impact_containment_percentage: 0.95
    escalation_level_threshold: 1
```

### Usage Notes
- Activate only during genuine crisis situations
- Automatically deactivates when crisis subsides
- Prioritizes quick wins and cascade prevention
- Accounts for resource diversion from normal operations