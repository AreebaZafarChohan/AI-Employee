## Template 6: Custom Priority Report

### Description
Template for creating custom reports based on specific organizational needs.

### Configuration Template
```yaml
reporting:
  template: custom_priority_report
  title: "{{custom_title}}"
  sections:
    - section: custom_metrics
      title: "{{section_title}}"
      elements:
        - type: metric_display
          title: "{{metric_title}}"
          metrics: "{{custom_metrics}}"
        - type: chart
          title: "{{chart_title}}"
          visualization: "{{chart_type}}"
          data_source: "{{data_source}}"
    - section: custom_analysis
      title: "{{analysis_section_title}}"
      elements:
        - type: table
          title: "{{table_title}}"
          columns: "{{table_columns}}"
          data_source: "{{table_data_source}}"
        - type: text_summary
          title: "{{summary_title}}"
          content: "{{custom_summary}}"
  filters:
    date_range: "{{filter_date_range}}"
    custom_filters: "{{additional_filters}}"
  scheduling:
    frequency: "{{custom_frequency}}"
    time: "{{custom_time}}"
    recipients: "{{custom_recipients}}"
  delivery_methods:
    - "{{delivery_method}}"
```

### Usage Notes
- Use this template as a starting point for organization-specific reports
- Customize sections and metrics based on specific requirements
- Integrate with existing reporting infrastructure