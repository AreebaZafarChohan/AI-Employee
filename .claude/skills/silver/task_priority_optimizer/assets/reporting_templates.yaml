- Adjust performance thresholds based on system requirements
- Include relevant metrics for your specific implementation
- Schedule based on system change frequency

## Template 3: Business Impact Report

### Description
Quantifies the business value and impact of the priority optimization system.

### Configuration Template
```yaml
reporting:
  template: business_impact
  title: "Priority Optimization Business Impact Report"
  sections:
    - section: productivity_metrics
      title: "Productivity Improvements"
      elements:
        - type: metric_display
          title: "Key Productivity Indicators"
          metrics:
            - { name: "Tasks Completed per Week", value: "{{tasks_completed_week}}", unit: "tasks", baseline: "{{baseline_tasks_week}}", improvement: "{{improvement_tasks_week}}" }
            - { name: "Average Task Cycle Time", value: "{{avg_cycle_time}}", unit: "days", baseline: "{{baseline_cycle_time}}", improvement: "{{improvement_cycle_time}}" }
            - { name: "Team Utilization Rate", value: "{{utilization_rate}}", unit: "%", baseline: "{{baseline_utilization}}", improvement: "{{improvement_utilization}}" }
        - type: chart
          title: "Productivity Trends Over Time"
          visualization: line_chart
          data_source: "productivity_trend"
    - section: deadline_compliance
      title: "Deadline Compliance"
      elements:
        - type: metric_display
          title: "Compliance Improvements"
          metrics:
            - { name: "On-time Delivery Rate", value: "{{on_time_delivery}}", unit: "%", baseline: "{{baseline_on_time}}", improvement: "{{improvement_on_time}}" }
            - { name: "Critical Deadline Misses", value: "{{critical_misses}}", unit: "misses", baseline: "{{baseline_critical_misses}}", improvement: "{{improvement_critical_misses}}" }
            - { name: "Average Days Late", value: "{{avg_days_late}}", unit: "days", baseline: "{{baseline_days_late}}", improvement: "{{improvement_days_late}}" }
        - type: chart
          title: "On-time Delivery Rate Trend"
          visualization: line_chart
          data_source: "on_time_delivery_trend"
    - section: cost_impact
      title: "Cost Impact Analysis"
      elements:
        - type: metric_display
          title: "Financial Impact"
          metrics:
            - { name: "Estimated Cost Savings", value: "{{cost_savings}}", unit: "USD", baseline: 0, improvement: "{{cost_savings}}" }
            - { name: "Overtime Reduction", value: "{{overtime_reduction}}", unit: "hours", baseline: "{{baseline_overtime}}", improvement: "{{improvement_overtime}}" }
            - { name: "Missed Opportunity Cost", value: "{{opportunity_cost}}", unit: "USD", baseline: "{{baseline_opportunity_cost}}", improvement: "{{improvement_opportunity_cost}}" }
        - type: chart
          title: "Cost Savings Over Time"
          visualization: area_chart
          data_source: "cost_savings_trend"
    - section: quality_metrics
      title: "Quality Improvements"
      elements:
        - type: metric_display
          title: "Quality Indicators"
          metrics:
            - { name: "Defect Rate", value: "{{defect_rate}}", unit: "%", baseline: "{{baseline_defect_rate}}", improvement: "{{improvement_defect_rate}}" }
            - { name: "Rework Rate", value: "{{rework_rate}}", unit: "%", baseline: "{{baseline_rework_rate}}", improvement: "{{improvement_rework_rate}}" }
            - { name: "Customer Satisfaction", value: "{{customer_sat}}", unit: "/10", baseline: "{{baseline_customer_sat}}", improvement: "{{improvement_customer_sat}}" }
        - type: chart
          title: "Defect Rate Trend"
          visualization: line_chart
          data_source: "defect_rate_trend"
    - section: roi_analysis
      title: "Return on Investment"
      elements:
        - type: metric_display
          title: "ROI Metrics"
          metrics:
            - { name: "System Implementation Cost", value: "{{implementation_cost}}", unit: "USD", baseline: 0, improvement: 0 }
            - { name: "Annual Benefit Value", value: "{{annual_benefit}}", unit: "USD", baseline: 0, improvement: "{{annual_benefit}}" }
            - { name: "Payback Period", value: "{{payback_period}}", unit: "months", baseline: 0, improvement: 0 }
            - { name: "3-Year ROI", value: "{{three_year_roi}}", unit: "%", baseline: 0, improvement: "{{three_year_roi}}" }
        - type: chart
          title: "Cumulative Benefit vs. Cost"
          visualization: combo_chart
          data_source: "roi_trend"
    - section: success_stories
      title: "Success Stories & Case Studies"
      elements:
        - type: text_list
          title: "Notable Successes"
          items: "{{success_stories}}"
        - type: text_list
          title: "Lessons Learned"
          items: "{{lessons_learned}}"
  filters:
    date_range: last_quarter
    departments: all
    project_types: ["strategic", "operational", "maintenance"]
  baseline_period: previous_quarter
  scheduling:
    frequency: monthly
    time: "10:00"
    recipients:
      - "executives"
      - "department_heads"
      - "finance_team"
  delivery_methods:
    - email
    - dashboard
    - presentation_format
```

