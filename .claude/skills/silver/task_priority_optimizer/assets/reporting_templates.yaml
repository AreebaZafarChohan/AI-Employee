## Template 4: Dependency Analysis Report

### Description
Provides insights into task dependencies and their impact on project timelines.

### Configuration Template
```yaml
reporting:
  template: dependency_analysis
  title: "Task Dependency Analysis Report"
  sections:
    - section: dependency_overview
      title: "Dependency Overview"
      elements:
        - type: metric_display
          title: "Dependency Statistics"
          metrics:
            - { name: "Total Dependencies", value: "{{total_dependencies}}", unit: "", threshold_good: null, threshold_warn: null }
            - { name: "Average Dependencies per Task", value: "{{avg_dependencies_per_task}}", unit: "", threshold_good: null, threshold_warn: null }
            - { name: "Tasks with Circular Dependencies", value: "{{circular_deps}}", unit: "", threshold_good: 0, threshold_warn: 1 }
            - { name: "Tasks on Critical Path", value: "{{critical_path_tasks}}", unit: "", threshold_good: null, threshold_warn: null }
        - type: chart
          title: "Dependency Types Distribution"
          visualization: pie_chart
          data_source: "dependency_types"
    - section: critical_path_analysis
      title: "Critical Path Analysis"
      elements:
        - type: table
          title: "Tasks on Critical Path"
          columns: ["Task ID", "Title", "Duration", "Early Start", "Late Start", "Float", "Dependencies"]
          data_source: "critical_path_tasks"
        - type: chart
          title: "Critical Path Visualization"
          visualization: gantt_chart
          data_source: "critical_path_gantt"
    - section: bottleneck_identification
      title: "Bottleneck Identification"
      elements:
        - type: table
          title: "Potential Bottlenecks"
          columns: ["Task ID", "Title", "Blocking Count", "Criticality Score", "Recommended Action"]
          data_source: "potential_bottlenecks"
        - type: chart
          title: "Bottleneck Severity Distribution"
          visualization: histogram
          data_source: "bottleneck_severity"
    - section: dependency_health
      title: "Dependency Health Assessment"
      elements:
        - type: metric_display
          title: "Health Indicators"
          metrics:
            - { name: "Orphaned Tasks", value: "{{orphaned_tasks}}", unit: "", threshold_good: 0, threshold_warn: 5 }
            - { name: "Unresolved Dependencies", value: "{{unresolved_deps}}", unit: "", threshold_good: 0, threshold_warn: 3 }
            - { name: "Long Chain Dependencies", value: "{{long_chains}}", unit: "", threshold_good: 0, threshold_warn: 2 }
            - { name: "External Dependencies", value: "{{external_deps}}", unit: "", threshold_good: null, threshold_warn: null }
        - type: chart
          title: "Dependency Health Trend"
          visualization: line_chart
          data_source: "dependency_health_trend"
    - section: recommendations
      title: "Dependency Optimization Recommendations"
      elements:
        - type: text_list
          title: "Tasks to Decompose"
          items: "{{decomposition_recommendations}}"
        - type: text_list
          title: "Dependencies to Simplify"
          items: "{{simplification_recommendations}}"
        - type: text_list
          title: "Parallelization Opportunities"
          items: "{{parallelization_opportunities}}"
  filters:
    date_range: current_sprint
    projects: all
    dependency_types: ["requires", "precedes", "resource_shared"]
  scheduling:
    frequency: biweekly
    time: "09:30"
    recipients:
      - "project_managers"
      - "scrum_masters"
      - "technical_leads"
  delivery_methods:
    - email
    - dashboard
    - jira_integration
```

### Sample Output
```html
