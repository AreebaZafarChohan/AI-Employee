## Template 5: Priority Conflict Resolution Report

### Description
Documents priority conflicts and their resolution to maintain system integrity.

### Configuration Template
```yaml
reporting:
  template: priority_conflict_resolution
  title: "Priority Conflict Resolution Report"
  sections:
    - section: conflict_summary
      title: "Conflict Summary"
      elements:
        - type: metric_display
          title: "Conflict Statistics"
          metrics:
            - { name: "Total Conflicts Detected", value: "{{total_conflicts}}", unit: "", threshold_good: null, threshold_warn: null }
            - { name: "Auto-Resolved Conflicts", value: "{{auto_resolved}}", unit: "", threshold_good: null, threshold_warn: null }
            - { name: "Manual Intervention Required", value: "{{manual_required}}", unit: "", threshold_good: null, threshold_warn: null }
            - { name: "Conflicts Resolved", value: "{{resolved}}", unit: "", threshold_good: null, threshold_warn: null }
        - type: chart
          title: "Conflict Types Distribution"
          visualization: pie_chart
          data_source: "conflict_types"
    - section: conflict_details
      title: "Detailed Conflict Analysis"
      elements:
        - type: table
          title: "Unresolved Conflicts Requiring Attention"
          columns: ["Conflict ID", "Tasks Involved", "Conflict Type", "Impact Level", "Reported Time", "Assigned To"]
          data_source: "unresolved_conflicts"
        - type: table
          title: "Recently Resolved Conflicts"
          columns: ["Conflict ID", "Tasks Involved", "Resolution Method", "Resolver", "Resolution Time", "Outcome"]
          data_source: "recently_resolved_conflicts"
    - section: resolution_patterns
      title: "Resolution Pattern Analysis"
      elements:
        - type: chart
          title: "Resolution Time Distribution"
          visualization: histogram
          data_source: "resolution_time_dist"
        - type: chart
          title: "Resolution Methods Used"
          visualization: bar_chart
          data_source: "resolution_methods_used"
    - section: escalation_matrix
      title: "Escalation Matrix"
      elements:
        - type: table
          title: "Escalation Guidelines"
          columns: ["Conflict Type", "Severity", "Time Threshold", "Escalation Target", "Action Required"]
          data_source: "escalation_guidelines"
        - type: chart
          title: "Escalation Frequency by Type"
          visualization: bar_chart
          data_source: "escalation_frequency"
    - section: prevention_insights
      title: "Conflict Prevention Insights"
      elements:
        - type: text_list
          title: "Common Root Causes"
          items: "{{common_root_causes}}"
        - type: text_list
          title: "Prevention Recommendations"
          items: "{{prevention_recommendations}}"
  filters:
    date_range: last_7_days
    conflict_types: ["resource_conflict", "deadline_collision", "dependency_violation", "policy_violation"]
    severity_levels: ["low", "medium", "high", "critical"]
  scheduling:
    frequency: daily
    time: "08:30"
    recipients:
      - "conflict_resolvers"
      - "system_administrators"
      - "process_managers"
  delivery_methods:
    - email
    - dashboard
    - slack_notification
```

