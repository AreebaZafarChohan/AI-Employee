# Reporting Templates

## Overview
This document contains templates for generating reports related to task priority optimization. These templates cover various aspects of priority analysis, system performance, and business impact measurement.

## Template 1: Priority Analysis Report

### Description
Provides a comprehensive view of current task priorities, highlighting key insights and recommendations.

### Configuration Template
```yaml
reporting:
  template: priority_analysis
  title: "Task Priority Analysis Report"
  sections:
    - section: executive_summary
      title: "Executive Summary"
      elements:
        - type: metric_display
          title: "Tasks by Priority Level"
          metric: "task_distribution_by_priority"
          visualization: pie_chart
        - type: metric_display
          title: "Average Time to Complete by Priority"
          metric: "avg_completion_time_by_priority"
          visualization: bar_chart
        - type: text_summary
          title: "Key Insights"
          content: "{{executive_insights}}"
    - section: priority_breakdown
      title: "Priority Breakdown"
      elements:
        - type: table
          title: "High Priority Tasks"
          columns: ["Task ID", "Title", "Current Priority", "Urgency Score", "Importance Score", "Deadline", "Dependencies"]
          data_source: "high_priority_tasks"
        - type: table
          title: "Medium Priority Tasks"
          columns: ["Task ID", "Title", "Current Priority", "Urgency Score", "Importance Score", "Deadline", "Dependencies"]
          data_source: "medium_priority_tasks"
        - type: table
          title: "Low Priority Tasks"
          columns: ["Task ID", "Title", "Current Priority", "Urgency Score", "Importance Score", "Deadline", "Dependencies"]
          data_source: "low_priority_tasks"
    - section: priority_changes
      title: "Recent Priority Changes"
      elements:
        - type: table
          title: "Tasks with Priority Changes in Last 24 Hours"
          columns: ["Task ID", "Title", "Previous Priority", "New Priority", "Change Reason", "Time Changed"]
          data_source: "recent_priority_changes"
        - type: chart
          title: "Priority Change Volume by Hour"
          visualization: line_chart
          data_source: "priority_change_volume"
    - section: recommendations
      title: "Recommendations"
      elements:
        - type: text_list
          title: "Tasks to Reprioritize"
          items: "{{reprioritization_recommendations}}"
        - type: text_list
          title: "Potential Bottlenecks"
          items: "{{bottleneck_identifications}}"
  filters:
    date_range: last_7_days
    priority_levels: ["high", "medium", "low"]
    projects: all
    teams: all
  scheduling:
    frequency: daily
    time: "09:00"
    recipients:
      - "project_managers"
      - "team_leads"
  delivery_methods:
    - email
    - dashboard
```

### Sample Output
```html
<h1>Task Priority Analysis Report</h1>

<h2>Executive Summary</h2>
<p>There are currently 42 high priority tasks, 87 medium priority tasks, and 156 low priority tasks.</p>
<p>Average completion time: High priority: 2.3 days, Medium priority: 4.7 days, Low priority: 8.1 days.</p>

<h2>Priority Breakdown</h2>
<h3>High Priority Tasks</h3>
<table>
  <thead>
    <tr><th>Task ID</th><th>Title</th><th>Priority</th><th>Urgency</th><th>Importance</th><th>Deadline</th><th>Dependencies</th></tr>
  </thead>
  <tbody>
    <tr><td>TASK-123</td><td>Fix login issue</td><td>0.92</td><td>0.85</td><td>0.95</td><td>2026-02-08</td><td>None</td></tr>
    <!-- More rows -->
  </tbody>
</table>

<!-- Additional sections... -->
```

### Usage Notes
- Configure distribution lists based on organizational needs
- Adjust time windows for priority change analysis
- Customize columns based on available task attributes

## Template 2: System Performance Report

### Description
Measures the performance and effectiveness of the priority optimization system.

### Configuration Template
```yaml
reporting:
  template: system_performance
  title: "Priority Optimization System Performance Report"
  sections:
    - section: system_metrics
      title: "System Performance Metrics"
      elements:
        - type: metric_display
          title: "Priority Calculation Performance"
          metrics:
            - { name: "Avg Calculation Time", value: "{{avg_calc_time}}", unit: "ms", threshold_good: 50, threshold_warn: 100 }
            - { name: "Calculation Throughput", value: "{{calc_throughput}}", unit: "tasks/sec", threshold_good: 100, threshold_warn: 50 }
            - { name: "Cache Hit Rate", value: "{{cache_hit_rate}}", unit: "%", threshold_good: 90, threshold_warn: 75 }
        - type: chart
          title: "Priority Calculation Time Trend"
          visualization: line_chart
          data_source: "calculation_time_trend"
    - section: algorithm_effectiveness
      title: "Algorithm Effectiveness"
      elements:
        - type: metric_display
          title: "Priority Accuracy Indicators"
          metrics:
            - { name: "On-time Completion Rate (High Priority)", value: "{{on_time_high_priority}}", unit: "%", threshold_good: 85, threshold_warn: 70 }
            - { name: "On-time Completion Rate (Low Priority)", value: "{{on_time_low_priority}}", unit: "%", threshold_good: 60, threshold_warn: 40 }
            - { name: "Priority Stability Index", value: "{{stability_index}}", unit: "", threshold_good: 0.8, threshold_warn: 0.6 }
        - type: chart
          title: "Completion Rates by Priority Level"
          visualization: bar_chart
          data_source: "completion_rates_by_priority"
    - section: user_adoption
      title: "User Adoption & Satisfaction"
      elements:
        - type: metric_display
          title: "Adoption Metrics"
          metrics:
            - { name: "Active Users", value: "{{active_users}}", unit: "", threshold_good: 50, threshold_warn: 25 }
            - { name: "Override Rate", value: "{{override_rate}}", unit: "%", threshold_good: 10, threshold_warn: 25 }
            - { name: "System Trust Score", value: "{{trust_score}}", unit: "/10", threshold_good: 8, threshold_warn: 6 }
        - type: chart
          title: "User Satisfaction Over Time"
          visualization: line_chart
          data_source: "satisfaction_trend"
    - section: integration_health
      title: "Integration Health"
      elements:
        - type: metric_display
          title: "Integration Performance"
          metrics:
            - { name: "API Success Rate", value: "{{api_success_rate}}", unit: "%", threshold_good: 99, threshold_warn: 95 }
            - { name: "Avg Response Time", value: "{{avg_response_time}}", unit: "ms", threshold_good: 500, threshold_warn: 1000 }
            - { name: "Sync Success Rate", value: "{{sync_success_rate}}", unit: "%", threshold_good: 98, threshold_warn: 90 }
        - type: chart
          title: "API Error Rates by Integration"
          visualization: bar_chart
          data_source: "api_errors_by_integration"
    - section: recommendations
      title: "System Optimization Recommendations"
      elements:
        - type: text_list
          title: "Performance Improvements"
          items: "{{performance_recommendations}}"
        - type: text_list
          title: "Algorithm Tuning Suggestions"
          items: "{{algorithm_recommendations}}"
  filters:
    date_range: last_30_days
    systems_monitored: ["priority_engine", "api_integrations", "data_sync"]
  scheduling:
    frequency: weekly
    time: "08:00"
    recipients:
      - "system_administrators"
      - "product_managers"
  delivery_methods:
    - email
    - dashboard
    - slack_notification
```

### Sample Output
```html
<h1>Priority Optimization System Performance Report</h1>

<h2>System Performance Metrics</h2>
<ul>
  <li>Avg Calculation Time: 32 ms (Good)</li>
  <li>Calculation Throughput: 125 tasks/sec (Good)</li>
  <li>Cache Hit Rate: 94% (Good)</li>
</ul>

<h2>Algorithm Effectiveness</h2>
<p>High priority tasks completed on time: 87%</p>
<p>Low priority tasks completed on time: 58%</p>
<p>Priority stability index: 0.82</p>

