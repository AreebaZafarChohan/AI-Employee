version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ai-employee-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-ai_employee_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ai_employee_password}
      POSTGRES_DB: ${DB_NAME:-ai_employee}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ai_employee_user} -d ${DB_NAME:-ai_employee}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: ai-employee-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-ai_employee_user}:${DB_PASSWORD:-ai_employee_password}@postgres:5432/${DB_NAME:-ai_employee}?schema=public
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      AI_API_KEY: ${AI_API_KEY:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/v1/system/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
